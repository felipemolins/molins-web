server {
    # Dentro del contenedor Docker escucha en todas las interfaces
    # en el puerto 8080. El tunel Cloudflare conecta al contenedor
    # a traves de la red Docker — nunca expuesto a internet directamente.
    listen 8080;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/html text/css application/javascript image/svg+xml;
    gzip_min_length 1024;

    location ~* \.(html|css|js|svg)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
